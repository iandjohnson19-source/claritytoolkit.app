<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ if .Params.noindex }}<meta name="robots" content="noindex">{{ end }}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #007AFF;
      --blue-dark: #005ecb;
      --text: #1c1c1e;
      --text-secondary: #6c6c70;
      --bg: #ffffff;
      --bg-secondary: #f2f2f7;
      --border: #e5e5ea;
      --radius: 12px;
      --max-width: 720px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { color: var(--blue-dark); text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    header nav {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .brand {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    header .brand:hover { text-decoration: none; color: var(--blue); }
    header .nav-links { display: flex; gap: 1.5rem; }
    header .nav-links a { color: var(--text-secondary); font-size: 0.9rem; }
    header .nav-links a:hover { color: var(--blue); text-decoration: none; }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    h2 { font-size: 1.25rem; font-weight: 600; margin: 2rem 0 0.5rem; }
    h3 { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 0.25rem; }
    p  { margin-bottom: 1rem; color: var(--text); }
    ul, ol { margin: 0 0 1rem 1.25rem; }
    li { margin-bottom: 0.25rem; }

    .meta {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .prose h2 { border-top: 1px solid var(--border); padding-top: 1.5rem; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    footer a { color: var(--text-secondary); }
    footer a:hover { color: var(--blue); }
  </style>
  {{ block "head" . }}{{ end }}
</head>
<body>
  <header>
    <nav>
      <a class="brand" href="/">ClarityToolkit</a>
      <div class="nav-links">
        <a href="/hydrotrack/">HydroTrack</a>
        <a href="/hydrotrack/blog/">Blog</a>
      </div>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    <p>© {{ now.Year }} ClarityToolkit &nbsp;·&nbsp; <a href="/hydrotrack/privacy/">Privacy Policy</a> &nbsp;·&nbsp; <a href="mailto:iandjohnson19@gmail.com">Contact</a></p>
  </footer>
</body>
</html>
